service: jobzshala-gcc-backend

frameworkVersion: '3'

provider:

  name: aws

  runtime: nodejs20.x

  region: ap-south-1

  stage: ${opt:stage, 'dev'}

  timeout: 29

  memorySize: 512

functions:

  api:

    handler: src/lambda/api.lambda.handler

    events:

      - httpApi:

          path: /{proxy+}

          method: ANY

      - httpApi:

          path: /

          method: ANY

plugins:

  - serverless-esbuild

custom:

  esbuild:

    bundle: true

    minify: false

    sourcemap: true

    platform: node

    target: node20

    external:

      - aws-sdk

    packager: npm